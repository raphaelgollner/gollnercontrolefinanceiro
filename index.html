<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gollner Controle Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-4 md:p-8 transition-colors duration-200">
    <div class="max-w-4xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="hidden md:block w-1/3"></div> 
            
            <h1 class="text-3xl font-bold text-blue-700 dark:text-blue-400 text-center w-full md:w-1/3">
                Controle Financeiro
            </h1>
            
            <div class="flex items-center justify-center md:justify-end gap-4 w-full md:w-1/3">
                <button id="btnTheme" class="flex items-center gap-2 px-4 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-full font-medium transition-colors">
                    <span id="themeIcon">🌙</span>
                    <span id="themeText">Modo Escuro</span>
                </button>
                <button id="btnLogout" class="hidden bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">Sair</button>
            </div>
        </header>

        <div id="loginSection" class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md max-w-sm mx-auto">
            <h2 id="authTitle" class="text-xl font-semibold mb-4 text-center">Acessar Sistema</h2>
            
            <input type="email" id="email" placeholder="Seu E-mail" class="w-full p-2 mb-3 border rounded dark:bg-gray-700 dark:border-gray-600">
            <input type="password" id="password" placeholder="Senha" class="w-full p-2 mb-4 border rounded dark:bg-gray-700 dark:border-gray-600">
            
            <button id="btnAcaoAuth" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 mb-4 transition-colors">
                Entrar
            </button>
            
            <div class="flex flex-col gap-2 text-sm text-center">
                <button id="btnAlternarModo" class="text-gray-600 dark:text-gray-400 hover:underline">
                    Não tem conta? Crie uma aqui
                </button>
                <button id="btnRecuperarSenha" class="text-blue-500 hover:underline">
                    Esqueci minha senha
                </button>
            </div>
        </div>

        <div id="mainSection" class="hidden space-y-6">
            
            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md">
                <h2 id="tituloForm" class="text-xl font-semibold mb-4">Adicionar Registro</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <input type="text" id="desc" placeholder="Descrição" class="p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                    <input type="number" step="0.01" id="valor" placeholder="Valor R$" class="p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                    <select id="tipo" class="p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                        <option value="receita">Receita</option>
                        <option value="despesa">Despesa</option>
                    </select>
                    <input type="date" id="data" class="p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                </div>
                <input type="text" id="obs" placeholder="Observação (opcional)" class="w-full mt-4 p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                
                <div class="mt-4 flex items-center justify-between flex-wrap gap-4">
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="flex items-center">
                            <input type="checkbox" id="recorrente" class="mr-2 w-5 h-5 cursor-pointer accent-blue-600">
                            <label for="recorrente" class="cursor-pointer">Recorrente (Mensal)</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" id="pago" class="mr-2 w-5 h-5 cursor-pointer accent-green-600">
                            <label for="pago" class="cursor-pointer">Já Pago/Recebido</label>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button id="btnCancelarEdicao" class="hidden bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600 w-full md:w-auto">Cancelar</button>
                        <button id="btnSalvar" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 w-full md:w-auto">Salvar Registro</button>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Resumo Mensal</h2>
                    <select id="seletorAno" class="p-2 border rounded dark:bg-gray-700 dark:border-gray-600 font-bold">
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
                
                <div id="abasMeses" class="flex overflow-x-auto gap-2 pb-2 mb-4 scrollbar-hide"></div>

                <div class="mb-6 relative h-48 md:h-64 w-full flex justify-center">
                    <canvas id="graficoMensal"></canvas>
                </div>

                <div id="listaTransacoes" class="divide-y dark:divide-gray-700 mb-6"></div>

                <div class="pt-4 border-t-2 border-gray-200 dark:border-gray-700">
                    <div class="flex justify-between items-center text-xl font-bold">
                        <span>Balanço do Mês:</span>
                        <span id="saldoFinal">R$ 0,00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://ttkkbdfzavtdrcdyvcqg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_NKWL0CxOmT-lcAzHL2vLCw_PpYPIk5D';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 2. VARIÁVEIS DE ESTADO
        // ==========================================
        let anoAtual = new Date().getFullYear();
        let mesAtual = new Date().getMonth() + 1; // 1 a 12
        let transacoesGlobais = [];
        let idEmEdicao = null;
        let meuGrafico = null;
        let modoAuth = 'login'; // 'login', 'cadastro', 'recuperacao'

        // Elementos UI
        const loginSection = document.getElementById('loginSection');
        const mainSection = document.getElementById('mainSection');
        const listaTransacoes = document.getElementById('listaTransacoes');
        const saldoFinal = document.getElementById('saldoFinal');

        // ==========================================
        // 3. MODO ESCURO
        // ==========================================
        const htmlElement = document.documentElement;
        const btnTheme = document.getElementById('btnTheme');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        
        function atualizarTextosTema(isDark) {
            if (isDark) {
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Modo Claro';
            } else {
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Modo Escuro';
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            htmlElement.classList.add('dark');
            atualizarTextosTema(true);
        }

        btnTheme.onclick = () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            atualizarTextosTema(isDark);
            if (!mainSection.classList.contains('hidden')) {
                filtrarEExibirDados(); // Repinta o gráfico com as cores novas
            }
        };

        // ==========================================
        // 4. AUTENTICAÇÃO (LOGIN, CADASTRO, RECUPERAÇÃO)
        // ==========================================
        const inputEmail = document.getElementById('email');
        const inputPassword = document.getElementById('password');
        const btnAcaoAuth = document.getElementById('btnAcaoAuth');
        const authTitle = document.getElementById('authTitle');
        const btnAlternarModo = document.getElementById('btnAlternarModo');
        const btnRecuperarSenha = document.getElementById('btnRecuperarSenha');
        const btnLogout = document.getElementById('btnLogout');

        function atualizarTelaAuth(modo) {
            modoAuth = modo;
            inputEmail.value = '';
            inputPassword.value = '';

            if (modo === 'login') {
                authTitle.textContent = 'Acessar Sistema';
                inputPassword.classList.remove('hidden');
                btnAcaoAuth.textContent = 'Entrar';
                btnAcaoAuth.className = 'w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 mb-4 transition-colors';
                btnAlternarModo.textContent = 'Não tem conta? Crie uma aqui';
                btnAlternarModo.classList.remove('hidden');
                btnRecuperarSenha.classList.remove('hidden');
            } else if (modo === 'cadastro') {
                authTitle.textContent = 'Criar Nova Conta';
                inputPassword.classList.remove('hidden');
                btnAcaoAuth.textContent = 'Cadastrar';
                btnAcaoAuth.className = 'w-full bg-green-600 text-white p-2 rounded hover:bg-green-700 mb-4 transition-colors';
                btnAlternarModo.textContent = 'Já tem uma conta? Faça login';
                btnAlternarModo.classList.remove('hidden');
                btnRecuperarSenha.classList.add('hidden');
            } else if (modo === 'recuperacao') {
                authTitle.textContent = 'Recuperar Senha';
                inputPassword.classList.add('hidden');
                btnAcaoAuth.textContent = 'Enviar link de recuperação';
                btnAcaoAuth.className = 'w-full bg-yellow-500 text-white p-2 rounded hover:bg-yellow-600 mb-4 transition-colors';
                btnAlternarModo.textContent = 'Voltar para o Login';
                btnAlternarModo.classList.remove('hidden');
                btnRecuperarSenha.classList.add('hidden');
            }
        }

        btnAcaoAuth.onclick = async () => {
            const email = inputEmail.value.trim();
            const password = inputPassword.value;

            if (!email) return alert('Por favor, informe um e-mail.');

            if (modoAuth === 'login') {
                if (!password) return alert('Informe a senha.');
                const { error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) alert('Erro: ' + error.message);
                else verificarSessao();

            } else if (modoAuth === 'cadastro') {
                if (!password) return alert('Crie uma senha.');
                const { error } = await _supabase.auth.signUp({ email, password });
                if (error) alert('Erro ao criar conta: ' + error.message);
                else {
                    alert('Conta criada com sucesso! Você já pode fazer login.');
                    atualizarTelaAuth('login');
                }

            } else if (modoAuth === 'recuperacao') {
                const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin
                });
                if (error) alert('Erro: ' + error.message);
                else alert('Link de recuperação enviado! Verifique seu e-mail (e a caixa de spam).');
            }
        };

        btnAlternarModo.onclick = () => {
            if (modoAuth === 'login') atualizarTelaAuth('cadastro');
            else atualizarTelaAuth('login');
        };

        btnRecuperarSenha.onclick = () => atualizarTelaAuth('recuperacao');

        async function verificarSessao() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                loginSection.classList.add('hidden');
                mainSection.classList.remove('hidden');
                btnLogout.classList.remove('hidden');
                renderizarAbas();
                buscarTodosOsDados();
            } else {
                // Caso não tenha sessão, garante que a tela principal não apareça
                loginSection.classList.remove('hidden');
                mainSection.classList.add('hidden');
                btnLogout.classList.add('hidden');
            }
        }

        btnLogout.onclick = async () => {
            await _supabase.auth.signOut();
            window.location.reload();
        };

        _supabase.auth.onAuthStateChange(async (event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                const novaSenha = prompt("Digite sua nova senha:");
                if (novaSenha) {
                    const { error } = await _supabase.auth.updateUser({ password: novaSenha });
                    if (error) alert("Erro ao atualizar senha: " + error.message);
                    else alert("Senha atualizada com sucesso!");
                }
            }
        });

        // ==========================================
        // 5. ABAS DE MESES E FILTROS
        // ==========================================
        const nomesMeses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        const abasContainer = document.getElementById('abasMeses');
        
        function renderizarAbas() {
            abasContainer.innerHTML = '';
            nomesMeses.forEach((nome, index) => {
                const mesNum = index + 1;
                const ativo = mesNum === mesAtual ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600';
                abasContainer.innerHTML += `
                    <button onclick="mudarMes(${mesNum})" class="px-4 py-2 rounded-lg font-semibold min-w-[60px] ${ativo}">
                        ${nome}
                    </button>
                `;
            });
        }

        function mudarMes(mes) {
            mesAtual = mes;
            renderizarAbas();
            filtrarEExibirDados();
        }

        document.getElementById('seletorAno').value = anoAtual;
        document.getElementById('seletorAno').onchange = (e) => {
            anoAtual = parseInt(e.target.value);
            filtrarEExibirDados();
        };

        // ==========================================
        // 6. CRUD E LÓGICA DE EXIBIÇÃO
        // ==========================================
        async function buscarTodosOsDados() {
            const { data, error } = await _supabase.from('transacoes').select('*');
            if (data) {
                transacoesGlobais = data;
                filtrarEExibirDados();
            }
        }

        function filtrarEExibirDados() {
            listaTransacoes.innerHTML = '';
            let totalReceitas = 0;
            let totalDespesas = 0;

            const filtradas = transacoesGlobais.filter(t => {
                const dataT = new Date(t.data_vencimento + 'T00:00:00');
                const anoT = dataT.getFullYear();
                const mesT = dataT.getMonth() + 1;

                if (t.recorrente) {
                    return anoT === anoAtual && mesAtual >= mesT;
                } else {
                    return anoT === anoAtual && mesT === mesAtual;
                }
            }).sort((a, b) => new Date(a.data_vencimento) - new Date(b.data_vencimento));

            if (filtradas.length === 0) {
                listaTransacoes.innerHTML = '<p class="text-gray-500 py-4 text-center">Nenhum registro neste mês.</p>';
            }

            filtradas.forEach(t => {
                const isReceita = t.tipo === 'receita';
                const corValor = isReceita ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
                const sinal = isReceita ? '+' : '-';
                
                if (isReceita) totalReceitas += t.valor;
                else totalDespesas += t.valor;

                const dataFormatada = new Date(t.data_vencimento + 'T00:00:00').toLocaleDateString('pt-BR');
                const obsBtn = t.observacao ? `<button onclick="toggleObs('${t.id}')" class="text-blue-500 hover:text-blue-700" title="Ver Observação">💬</button>` : '';
                const recurIcon = t.recorrente ? '🔄' : '';
                const estiloPago = t.pago ? 'opacity-50 line-through' : '';

                listaTransacoes.innerHTML += `
                    <div class="py-3 flex flex-col transition-all hover:bg-gray-50 dark:hover:bg-gray-800/50 rounded px-2 -mx-2">
                        <div class="flex justify-between items-center gap-3">
                            <input type="checkbox" ${t.pago ? 'checked' : ''} onchange="marcarComoPago('${t.id}', this.checked)" class="w-5 h-5 cursor-pointer accent-green-600 flex-shrink-0">
                            
                            <div class="flex-1 ${estiloPago}">
                                <p class="font-bold text-lg">${t.descricao} <span class="text-xs ml-1">${recurIcon}</span></p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">${dataFormatada}</p>
                            </div>
                            <span class="${corValor} font-bold mr-4 text-lg ${estiloPago}">
                                ${sinal} R$ ${t.valor.toFixed(2)}
                            </span>
                            <div class="flex gap-3 text-lg flex-shrink-0">
                                ${obsBtn}
                                <button onclick="prepararEdicao('${t.id}')" class="hover:scale-110 transition" title="Editar">📝</button>
                                <button onclick="excluirRegistro('${t.id}')" class="hover:scale-110 transition" title="Excluir">❌</button>
                            </div>
                        </div>
                        <div id="obs-${t.id}" class="hidden mt-2 p-3 bg-blue-50 dark:bg-blue-900/30 text-sm rounded-lg italic">
                            ${t.observacao || ''}
                        </div>
                    </div>
                `;
            });

            const saldo = totalReceitas - totalDespesas;
            saldoFinal.textContent = `R$ ${saldo.toFixed(2)}`;
            saldoFinal.className = saldo >= 0 ? 'text-green-600 dark:text-green-400 font-bold' : 'text-red-600 dark:text-red-400 font-bold';

            atualizarGrafico(totalReceitas, totalDespesas);
        }

        function atualizarGrafico(receitas, despesas) {
            const ctx = document.getElementById('graficoMensal').getContext('2d');
            if (meuGrafico) meuGrafico.destroy();

            if (receitas === 0 && despesas === 0) {
                document.getElementById('graficoMensal').style.display = 'none';
                return;
            } else {
                document.getElementById('graficoMensal').style.display = 'block';
            }

            const isDark = document.documentElement.classList.contains('dark');
            const corTexto = isDark ? '#e5e7eb' : '#374151';

            meuGrafico = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Receitas', 'Despesas'],
                    datasets: [{
                        data: [receitas, despesas],
                        backgroundColor: ['#16a34a', '#dc2626'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: corTexto, font: { size: 14 } } }
                    }
                }
            });
        }

        window.toggleObs = (id) => document.getElementById(`obs-${id}`).classList.toggle('hidden');

        window.marcarComoPago = async (id, isPago) => {
            const { error } = await _supabase.from('transacoes').update({ pago: isPago }).eq('id', id);
            if (error) alert("Erro ao atualizar status: " + error.message);
            else buscarTodosOsDados();
        };

        document.getElementById('btnSalvar').onclick = async () => {
            const desc = document.getElementById('desc').value;
            const valor = document.getElementById('valor').value;
            const tipo = document.getElementById('tipo').value;
            const data = document.getElementById('data').value;
            const obs = document.getElementById('obs').value;
            const recorrente = document.getElementById('recorrente').checked;
            const pago = document.getElementById('pago').checked;

            if (!desc || !valor || !data) return alert("Preencha Descrição, Valor e Data!");

            const { data: { user } } = await _supabase.auth.getUser();
            const payload = { 
                descricao: desc, valor: parseFloat(valor), tipo, data_vencimento: data, 
                observacao: obs, recorrente, pago, user_id: user.id 
            };

            let error;
            if (idEmEdicao) {
                const res = await _supabase.from('transacoes').update(payload).eq('id', idEmEdicao);
                error = res.error;
            } else {
                const res = await _supabase.from('transacoes').insert([payload]);
                error = res.error;
            }

            if (error) alert("Erro ao salvar: " + error.message);
            else {
                limparFormulario();
                buscarTodosOsDados();
            }
        };

        window.prepararEdicao = (id) => {
            const t = transacoesGlobais.find(x => x.id === id);
            if (!t) return;

            document.getElementById('desc').value = t.descricao;
            document.getElementById('valor').value = t.valor;
            document.getElementById('tipo').value = t.tipo;
            document.getElementById('data').value = t.data_vencimento;
            document.getElementById('obs').value = t.observacao || '';
            document.getElementById('recorrente').checked = t.recorrente;
            document.getElementById('pago').checked = t.pago || false;

            idEmEdicao = t.id;
            document.getElementById('tituloForm').textContent = "Editar Registro";
            document.getElementById('btnSalvar').textContent = "Atualizar";
            document.getElementById('btnCancelarEdicao').classList.remove('hidden');
            window.scrollTo(0, 0);
        };

        document.getElementById('btnCancelarEdicao').onclick = limparFormulario;

        function limparFormulario() {
            idEmEdicao = null;
            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('data').value = '';
            document.getElementById('obs').value = '';
            document.getElementById('recorrente').checked = false;
            document.getElementById('pago').checked = false;
            
            document.getElementById('tituloForm').textContent = "Adicionar Registro";
            document.getElementById('btnSalvar').textContent = "Salvar Registro";
            document.getElementById('btnCancelarEdicao').classList.add('hidden');
        }

        window.excluirRegistro = async (id) => {
            if (confirm("Tem certeza que deseja excluir este registro?")) {
                const { error } = await _supabase.from('transacoes').delete().eq('id', id);
                if (error) alert("Erro ao excluir: " + error.message);
                else buscarTodosOsDados();
            }
        };

        // INICIALIZAÇÃO
        verificarSessao();
    </script>
</body>
</html>
